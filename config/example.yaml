# Copy this file to config/mapper.yaml and fill in your settings.
# mapper.yaml is gitignored — your API key stays local.

openai_api_key: "sk-..."

freshness:
  max_days_old: 7
  max_commits_old: 10

token_ceiling: 1000

extensions:
  - .py
  - .js
  - .ts
  - .jsx
  - .tsx
  - .go
  - .rs
  - .java

embedding_model: text-embedding-3-small

# Rate limiting — tune to your OpenAI plan's RPM (requests per minute).
# Free tier ≈ 3 RPM; pay-as-you-go tier 1 ≈ 500 RPM.
rpm_limit: 10

# Maximum number of modules indexed in parallel.
max_concurrency: 4

agents:
  explorer:
    model: gpt-4o
    temperature: 0.2
    system_prompt: >
      You are a senior engineer exploring a code module.
      Identify the module's purpose, entry points, and key dependencies.

  analyst:
    model: gpt-4o
    temperature: 0.3
    system_prompt: >
      You are a code analyst. Given exploration results,
      identify non-obvious patterns, gotchas, and tribal knowledge.

  writer:
    model: gpt-4o
    temperature: 0.4
    system_prompt: >
      You are a technical writer. Produce a concise context compass as valid JSON
      with exactly these keys:
      {"quick_commands": "<shell commands for common tasks>",
       "key_files": ["<3-5 most important files>"],
       "non_obvious_patterns": "<tribal knowledge buried in the code>",
       "gotchas": "<common pitfalls and surprises>",
       "see_also": ["<related modules or docs>"]}
      Output ONLY the JSON object, no markdown fences, no extra text.

  critic:
    model: gpt-4o
    temperature: 0.1
    system_prompt: >
      You are a quality reviewer. Evaluate the context compass for accuracy,
      completeness, and conciseness. Respond with valid JSON:
      {"feedback": "<your review>", "confidence": <0.0 to 1.0>}
      Output ONLY the JSON object, no markdown fences, no extra text.
