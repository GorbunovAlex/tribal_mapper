# Reusable workflow — add this to the TARGET repo that you want indexed.
# It clones tribal_mapper, installs it, and runs indexing on a cron schedule.
#
# Required: set OPENAI_API_KEY as a repository secret.

name: Update Tribal Knowledge

on:
  schedule:
    - cron: "0 3 * * 1"  # every Monday at 03:00 UTC
  workflow_dispatch: # allow manual trigger

jobs:
  index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Clone & install tribal_mapper
        run: |
          git clone --depth 1 --branch main https://github.com/<your-org>/tribal_mapper.git /tmp/tribal_mapper
          cd /tmp/tribal_mapper
          # Pin to a known-good commit for reproducibility:
          # git checkout <commit-sha>
          uv sync

      - name: Create mapper config
        run: |
          cat > /tmp/tribal_mapper/config/mapper.yaml << 'EOF'
          openai_api_key: "${{ secrets.OPENAI_API_KEY }}"
          rpm_limit: 30
          max_concurrency: 2
          token_ceiling: 1000
          extensions: [.go, .py, .ts, .js]
          EOF

      - name: Run indexing
        working-directory: /tmp/tribal_mapper
        run: uv run python main.py index ${{ github.workspace }}

      - name: Open PR with updated context
        env:
          # Uses GITHUB_TOKEN by default. If your repo blocks Actions from
          # creating PRs, either:
          #   1. Enable "Allow GitHub Actions to create and approve pull requests"
          #      under Settings → Actions → General → Workflow permissions, OR
          #   2. Replace github.token with a PAT secret that has 'repo' scope:
          #      GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="chore/update-tribal-knowledge-$(date +%Y%m%d-%H%M%S)"
          git config user.name "tribal-mapper[bot]"
          git config user.email "tribal-mapper[bot]@users.noreply.github.com"
          git add .ai_context/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git checkout -b "$BRANCH"
          git commit -m "chore: update tribal knowledge context"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: update tribal knowledge context" \
            --body "Auto-generated by tribal-mapper. Updates \`.ai_context/\` files." \
            --base main \
            --head "$BRANCH"
